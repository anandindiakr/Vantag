version: "3.9"

# Vantag Singapore — Production
# Domain: sg.vantag.io
# Currency: SGD | Language: en/zh

x-common-env: &common-env
  REGION: "SG"
  APP_NAME: "Vantag"
  DOMAIN: "sg.vantag.io"
  TZ: "Asia/Singapore"
  LOG_LEVEL: "INFO"

services:
  postgres_sg:
    image: postgres:16-alpine
    container_name: vantag_postgres_sg
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-vantag_sg}
    volumes:
      - vantag_pg_sg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vantag_sg

  redis_sg:
    image: redis:7-alpine
    container_name: vantag_redis_sg
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - vantag_redis_sg:/data
    networks:
      - vantag_sg

  mosquitto_sg:
    image: eclipse-mosquitto:2.0
    container_name: vantag_mqtt_sg
    restart: always
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - vantag_mqtt_sg:/mosquitto/data
    networks:
      - vantag_sg

  backend_sg:
    image: ghcr.io/vantag/backend:${IMAGE_TAG:-latest}
    container_name: vantag_backend_sg
    restart: always
    environment:
      <<: *common-env
      DATABASE_URL: postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@postgres_sg:5432/${DB_NAME:-vantag_sg}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis_sg:6379
      MQTT_HOST: mosquitto_sg
      MQTT_PORT: "1883"
      SECRET_KEY: ${SECRET_KEY}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID_SG}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET_SG}
      CORS_ORIGINS: "https://sg.vantag.io"
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
    depends_on:
      postgres_sg:
        condition: service_healthy
      redis_sg:
        condition: service_started
    networks:
      - vantag_sg
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8800/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend_sg:
    image: ghcr.io/vantag/frontend:${IMAGE_TAG:-latest}
    container_name: vantag_frontend_sg
    restart: always
    environment:
      VITE_REGION: "SG"
      VITE_APP_NAME: "Vantag"
    networks:
      - vantag_sg

  nginx_sg:
    image: nginx:1.27-alpine
    container_name: vantag_nginx_sg
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/singapore.conf:/etc/nginx/conf.d/vantag.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - backend_sg
      - frontend_sg
    networks:
      - vantag_sg

networks:
  vantag_sg:
    driver: bridge

volumes:
  vantag_pg_sg:
  vantag_redis_sg:
  vantag_mqtt_sg:
