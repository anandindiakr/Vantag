<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Vantag Retail Intelligence Platform — AI-powered retail security dashboard" />
    <title>Vantag — Retail Intelligence Platform</title>
    <link id="fav" rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <script>
      // Region-aware favicon + title swap based on hostname
      (function () {
        try {
          var h = (location.hostname || '').toLowerCase();
          var cfg = { icon: '/favicon-sg.svg', title: 'Vantag — Retail Intelligence' };
          if (h.indexOf('retailnazar') !== -1) {
            cfg = { icon: '/favicon-in.svg', title: 'Vantag — Retail Nazar' };
          } else if (h.indexOf('jagajaga') !== -1) {
            cfg = { icon: '/favicon-my.svg', title: 'Vantag — JagaJaga' };
          }
          var el = document.getElementById('fav');
          if (el) el.setAttribute('href', cfg.icon);
          document.title = cfg.title;
        } catch (e) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Space+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body class="bg-vantag-dark text-white antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
