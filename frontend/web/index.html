          // Apply
          document.documentElement.setAttribute('lang', cfg.lang);
          document.title = cfg.title;

          function setMeta(id, attr, value) {
            var el = document.getElementById(id);
            if (el) el.setAttribute(attr, value);
          }
          setMeta('seo-canonical', 'href', origin + '/');
          setMeta('og-title', 'content', cfg.title);
          setMeta('og-description', 'content', cfg.description);
          setMeta('og-url', 'content', origin + '/');
          setMeta('og-site', 'content', cfg.brand);
          setMeta('tw-title', 'content', cfg.title);
          setMeta('tw-description', 'content', cfg.description);
          setMeta('fav', 'href', cfg.icon);

          var descEl = document.querySelector('meta[name="description"]');
          if (descEl) descEl.setAttribute('content', cfg.description);
          var locEl = document.querySelector('meta[property="og:locale"]');
          if (locEl) locEl.setAttribute('content', cfg.locale);
        } catch (e) {}
