global:
  mqtt_broker: localhost
  mqtt_port: 1883
  reconnect_backoff_max: 64
  frame_buffer_size: 30
  risk_score_window_seconds: 60
  yolo_model_path: models/yolov8n.pt
  yolo_device: cpu
  yolo_conf_threshold: 0.25
  product_classes:
  - bottle
  - cup
  - bowl
  - banana
  - apple
  - orange
  - sandwich
  - book
  - vase
  - backpack
  - handbag
  - suitcase
  - laptop
  - cell phone
  - remote
  - scissors
  - teddy bear
  - clock
  - wine glass
  - fork
  - knife
  - spoon
cameras:
- id: cam-01
  name: Camera – Zone A
  rtsp_url: rtsp://<USER>:<PASS>@<HOST>:554/
  location: Zone A
  resolution:
    width: 1920
    height: 1080
  fps_target: 15
  enabled: true
  low_light_mode: false
  zones: []
  staff_zone_colors:
  - '#FF6600'
  - '#0099FF'
  analyzer_config:
    shoplifting:
      proximity_px: 80
      sweep_window_seconds: 6.0
      sweep_item_threshold: 1
      cooldown_seconds: 30
    inventory_movement:
      drop_threshold: 2
      check_interval_seconds: 5.0
      cooldown_seconds: 20
      person_suppression: true
      zones:
      - label: Shelf A1
        bbox:
        - 50
        - 200
        - 640
        - 700
      - label: Shelf A2
        bbox:
        - 640
        - 200
        - 1280
        - 700
      - label: Shelf A3
        bbox:
        - 1280
        - 200
        - 1870
        - 700
    restricted_zone:
      cooldown_seconds: 30
      min_frames_inside: 2
      restricted_zones:
      - name: Back Office
        polygon:
        - - 1600
          - 0
        - - 1920
          - 0
        - - 1920
          - 400
        - - 1600
          - 400
        severity: critical
      - name: Staff Only
        polygon:
        - - 0
          - 800
        - - 300
          - 800
        - - 300
          - 1080
        - - 0
          - 1080
        severity: high
    queue_length:
      alert_threshold: 5
      check_interval_seconds: 3.0
      cooldown_seconds: 60
      queue_zones:
      - label: Checkout Lane A
        bbox:
        - 700
        - 600
        - 1300
        - 1080
        max_queue: 4
    fall_detection:
      min_fallen_frames: 5
      aspect_ratio_threshold: 1.4
      cooldown_seconds: 45
      alert_severity: critical
