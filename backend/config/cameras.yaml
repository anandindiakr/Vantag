global:
  mqtt_broker: "localhost"
  mqtt_port: 1883
  reconnect_backoff_max: 64          # seconds – exponential backoff ceiling
  frame_buffer_size: 30              # max frames held per camera queue
  risk_score_window_seconds: 60      # rolling window for risk aggregation
  yolo_model_path: "models/yolov8n.pt"
  yolo_device: "cpu"                 # "cpu" | "cuda" | "cuda:0"
  yolo_conf_threshold: 0.45

# Real cameras discovered on 192.168.1.0/24 – 2026-04-06
# Working RTSP URLs confirmed with cv2.VideoCapture live-frame read
cameras:
  - id: "cam-01"
    name: "Camera – Zone A"
    rtsp_url: "rtsp://192.168.1.106:554/"
    location: "Zone A"
    resolution:
      width: 1920
      height: 1080
    fps_target: 15
    enabled: true
    low_light_mode: false
    zones: []
    staff_zone_colors:
      - "#FF6600"
      - "#0099FF"
    analyzer_config:
      # Shoplifting – use default thresholds
      shoplifting:
        proximity_px: 130
        sweep_window_seconds: 4.0
        sweep_item_threshold: 3
        cooldown_seconds: 30

      # Inventory monitoring zones (bboxes in 1920x1080 pixel coords)
      inventory_movement:
        drop_threshold: 2
        check_interval_seconds: 5.0
        cooldown_seconds: 20
        person_suppression: true
        zones:
          - label: "Shelf A1"
            bbox: [50, 200, 640, 700]
          - label: "Shelf A2"
            bbox: [640, 200, 1280, 700]
          - label: "Shelf A3"
            bbox: [1280, 200, 1870, 700]

      # Restricted zones
      restricted_zone:
        cooldown_seconds: 15
        min_frames_inside: 3
        restricted_zones:
          - name: "Back Office"
            polygon: [[1600, 0], [1920, 0], [1920, 400], [1600, 400]]
            severity: "critical"
          - name: "Staff Only"
            polygon: [[0, 800], [300, 800], [300, 1080], [0, 1080]]
            severity: "high"
            allowed_hours: [8, 22]   # alert only between 10pm-8am

      # Queue zones
      queue_length:
        alert_threshold: 5
        check_interval_seconds: 3.0
        cooldown_seconds: 60
        queue_zones:
          - label: "Checkout Lane A"
            bbox: [700, 600, 1300, 1080]
            max_queue: 4

      # Fall detection
      fall_detection:
        min_fallen_frames: 5
        aspect_ratio_threshold: 1.4
        cooldown_seconds: 45
        alert_severity: "critical"

