# ===========================================================================
# docker/docker-compose.prod.yml
# Vantag Production Docker Compose
#
# Usage:
#   docker compose -f docker/docker-compose.prod.yml up -d --build
#
# Before first run:
#   1. Copy .env.example → .env and fill in all values
#   2. Run docker/certbot/init-letsencrypt.sh to get SSL certificate
#   3. Replace YOUR_DOMAIN in docker/nginx/conf.d/vantag.conf
# ===========================================================================

version: '3.9'

networks:
  vantag-prod:
    driver: bridge

volumes:
  postgres-data:
    driver: local
  certbot-conf:
    driver: local
  certbot-www:
    driver: local
  mosquitto-data:
    driver: local
  mosquitto-logs:
    driver: local
  snapshots:
    driver: local

services:

  # ── PostgreSQL (production) ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: vantag-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-vantag}
      POSTGRES_USER:     ${POSTGRES_USER:-vantag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    command: >
      postgres
        -c max_connections=200
        -c shared_buffers=256MB
        -c effective_cache_size=768MB
        -c work_mem=4MB
        -c maintenance_work_mem=64MB
        -c wal_level=replica
        -c archive_mode=on
        -c archive_command='test ! -f /var/lib/postgresql/wal/%f && cp %p /var/lib/postgresql/wal/%f'
    networks:
      - vantag-prod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vantag} -d ${POSTGRES_DB:-vantag}"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Mosquitto MQTT broker ─────────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: vantag-mosquitto-prod
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-logs:/mosquitto/log
    networks:
      - vantag-prod
    healthcheck:
      test: ["CMD", "mosquitto_pub", "-h", "localhost", "-t", "health", "-m", "ping", "-q", "0"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Vantag backend (FastAPI) ──────────────────────────────────────────────
  vantag-backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.edge
    container_name: vantag-backend
    restart: unless-stopped
    expose:
      - "8800"
    volumes:
      - ../models:/app/models
      - ../backend/config:/app/backend/config
      - snapshots:/app/snapshots
    environment:
      VANTAG_ENV:           production
      DATABASE_URL:         postgresql+asyncpg://${POSTGRES_USER:-vantag}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-vantag}
      VANTAG_JWT_SECRET:    ${VANTAG_JWT_SECRET}
      VANTAG_FACE_KEY:      ${VANTAG_FACE_KEY}
      MQTT_BROKER:          mosquitto
      MQTT_PORT:            1883
      VANTAG_SMTP_HOST:     ${VANTAG_SMTP_HOST:-smtp.gmail.com}
      VANTAG_SMTP_PORT:     ${VANTAG_SMTP_PORT:-587}
      VANTAG_SMTP_USER:     ${VANTAG_SMTP_USER}
      VANTAG_SMTP_PASS:     ${VANTAG_SMTP_PASS}
      VANTAG_EMAIL_FROM:    ${VANTAG_EMAIL_FROM:-Vantag <noreply@vantag.com>}
      RAZORPAY_KEY_ID_IN:   ${RAZORPAY_KEY_ID_IN}
      RAZORPAY_KEY_SECRET_IN: ${RAZORPAY_KEY_SECRET_IN}
      RAZORPAY_KEY_ID_SG:   ${RAZORPAY_KEY_ID_SG}
      RAZORPAY_KEY_SECRET_SG: ${RAZORPAY_KEY_SECRET_SG}
      RAZORPAY_KEY_ID_MY:   ${RAZORPAY_KEY_ID_MY}
      RAZORPAY_KEY_SECRET_MY: ${RAZORPAY_KEY_SECRET_MY}
      PYTHONUNBUFFERED:     1
    command: >
      python -m uvicorn backend.api.main:app
        --host 0.0.0.0
        --port 8800
        --workers 2
        --proxy-headers
        --forwarded-allow-ips "*"
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    networks:
      - vantag-prod
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8800/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  # ── Nginx (reverse proxy + SSL termination + static files) ────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: vantag-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ../frontend/web/dist:/usr/share/nginx/html:ro
      - certbot-conf:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
    depends_on:
      vantag-backend:
        condition: service_healthy
    networks:
      - vantag-prod
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Certbot (auto-renews Let's Encrypt certificate every 12 hours) ────────
  certbot:
    image: certbot/certbot:latest
    container_name: vantag-certbot
    restart: unless-stopped
    volumes:
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --quiet; sleep 43200 & wait $${!}; done"
    networks:
      - vantag-prod
