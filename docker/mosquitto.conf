# ===========================================================================
# Mosquitto MQTT broker configuration — Vantag platform (Mosquitto 2.0)
# ===========================================================================

# ---------------------------------------------------------------------------
# Global settings
# ---------------------------------------------------------------------------
max_queued_messages 1000
max_inflight_messages 20

# ---------------------------------------------------------------------------
# TCP listener — port 1883
# ---------------------------------------------------------------------------
listener 1883
protocol mqtt

# ---------------------------------------------------------------------------
# WebSocket listener — port 9001
# ---------------------------------------------------------------------------
listener 9001
protocol websockets

# ---------------------------------------------------------------------------
# Authentication — allow anonymous for development
# ---------------------------------------------------------------------------
allow_anonymous true

# ---------------------------------------------------------------------------
# Persistence
# ---------------------------------------------------------------------------
persistence true
persistence_location /mosquitto/data/

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
log_dest stdout
log_dest file /mosquitto/log/mosquitto.log
log_type all
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S
