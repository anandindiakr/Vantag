# ===========================================================================
# Mosquitto MQTT broker configuration — Vantag platform
# ===========================================================================
# Supports both TCP (port 1883) and WebSocket (port 9001) listeners.
# Anonymous connections are permitted in development / edge mode.
#
# For production deployments, replace the allow_anonymous directive with
# password_file / TLS settings.
# ===========================================================================

# ---------------------------------------------------------------------------
# Global settings
# ---------------------------------------------------------------------------

# Maximum number of queued messages per client.
max_queued_messages 1000

# Maximum in-flight QoS 1/2 messages per client.
max_inflight_messages 20

# Keepalive seconds — clients must ping within this interval.
keepalive_interval 60

# Maximum message payload size (bytes).  0 = unlimited.
message_size_limit 0

# Upgrade all QoS 0 subscriptions to QoS 1 when a client reconnects with
# a clean session (reduces message loss on flaky edge networks).
upgrade_outgoing_qos false

# ---------------------------------------------------------------------------
# TCP listener — port 1883
# ---------------------------------------------------------------------------
listener 1883
protocol mqtt

# ---------------------------------------------------------------------------
# WebSocket listener — port 9001
# (used by the React dashboard and mobile app)
# ---------------------------------------------------------------------------
listener 9001
protocol websockets

# Allow cross-origin WebSocket connections from the dashboard.
# In production, restrict this to your domain.
http_dir /mosquitto/www

# ---------------------------------------------------------------------------
# Authentication
# ---------------------------------------------------------------------------
# Development / edge mode: allow anonymous connections.
# Production: set allow_anonymous false and configure password_file or TLS.
allow_anonymous true

# Uncomment and configure for password-based auth:
# allow_anonymous false
# password_file /mosquitto/config/passwd

# ---------------------------------------------------------------------------
# Persistence
# ---------------------------------------------------------------------------
# Persist retained messages and subscription information across restarts.
persistence true
persistence_location /mosquitto/data/

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
# Log to stdout (captured by Docker) and to a file.
log_dest stdout
log_dest file /mosquitto/log/mosquitto.log

# Log all message types including SUBSCRIBE, PUBLISH, CONNECT, DISCONNECT.
log_type all

# Include timestamps in log lines.
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# Maximum log file size before rotation (bytes).  0 = unlimited.
log_file_size 10485760

# Number of rotated log files to keep.
log_file_count 3
