# ===========================================================================
# docker/nginx/conf.d/vantag.conf
# HTTP → HTTPS redirect + HTTPS server block with SSL termination
#
# Replace YOUR_DOMAIN with your actual domain before deploying, e.g.:
#   retailnazar.in       (India)
#   vantag.com.sg        (Singapore)
#   vantag.com.my        (Malaysia)
# ===========================================================================

# ── HTTP: redirect everything to HTTPS ───────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # Let's Encrypt webroot challenge (must be accessible over HTTP)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS: main site ─────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # ── SSL certificates (managed by Certbot / Let's Encrypt) ────────────────
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=()" always;

    # ── Frontend static files (React SPA) ────────────────────────────────────
    root  /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;   # client-side routing fallback

        # Cache static assets aggressively
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }

    # ── API proxy → FastAPI backend ───────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass         http://vantag-backend:8800;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Tighten rate limit on auth endpoints
    location ~ ^/api/auth/(login|register|send-otp) {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass         http://vantag-backend:8800;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── WebSocket proxy ───────────────────────────────────────────────────────
    location /ws/ {
        proxy_pass          http://vantag-backend:8800;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection $connection_upgrade;
        proxy_set_header    Host       $host;
        proxy_read_timeout  3600s;   # keep WS connections alive for 1 hour
        proxy_send_timeout  3600s;
    }

    # ── Health check endpoint (no auth, no rate limit) ────────────────────────
    location /health {
        proxy_pass http://vantag-backend:8800/health;
        access_log off;
    }

    # ── Block common attack patterns ──────────────────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }
}
